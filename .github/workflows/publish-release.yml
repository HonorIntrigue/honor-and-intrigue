name: Publish Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          cache: yarn
          node-version: 22

      - name: Extract tag version number
        id: get-version
        run: echo "version-without-v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Substitute links for versioned ones
        id: sub_link_version
        uses: devops-actions/variable-substitution@v1.2
        with:
          files: static/system.json
        env:
          download: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/honor-and-intrigue.zip
          manifest: https://github.com/${{ github.repository }}/releases/latest/download/system.json
          version: ${{ steps.get-version.outputs.version-without-v }}

      - name: Build package
        run: |
          yarn install
          yarn build

      - name: Create zip
        run: |
          (cd public; zip -r9 ../honor-and-intrigue.zip ./)
          zip -u ./honor-and-intrigue.zip LICENSE.md README.md

      - name: Get changelog body
        id: changelog
        continue-on-error: true
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: query
          version: ${{ steps.get-version.outputs.version-without-v }}

      - name: Update release with files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ github.event.release.tag_name }}" \
            --title "${{ steps.get-version.outputs.version-without-v }}" \
            --notes "${{ steps.changelog.outputs.release-notes }}"
          gh release upload "${{ github.event.release.tag_name }}" \
            ./public/system.json \
            ./honor-and-intrigue.zip \
            --clobber

      - name: Publish to FoundryVTT
        run: |
          MINIMUM=$(jq -r '.compatibility.minimum' public/system.json)
          VERIFIED=$(jq -r '.compatibility.verified' public/system.json)
          curl -fsSL -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.PACKAGE_TOKEN }}" \
            -d @- <<EOF
          {
            "id": "honor-and-intrigue",
            "release": {
              "version": "${{ steps.get-version.outputs.version-without-v }}",
              "manifest": "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/system.json",
              "compatibility": {
                "minimum": "$MINIMUM",
                "verified": "$VERIFIED"
              }
            }
          }
          EOF
